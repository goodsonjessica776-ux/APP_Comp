    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .ad-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ad-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: var(--accent);
        }

        .video-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        /* Loading Animation */
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>

        </div>

        <!-- Ad Grid -->
        <div id="adGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards injected by JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-40 opacity-50">
            <i data-lucide="search-x" class="w-16 h-16 mb-4"></i>
            <p class="text-lg">未找到相关素材</p>

    </main>

                            </div>

        const adGrid = document.getElementById('adGrid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const totalAdsEl = document.getElementById('totalAds');
        const maxImprEl = document.getElementById('maxImpressions');
        const lastUpdatedEl = document.getElementById('lastUpdated');

        function init() {
            lucide.createIcons();
            updateStats();
            renderAds(adsData);
        }

        function updateStats() {
            totalAdsEl.innerText = adsData.length;
            const impressions = adsData.map(a => a.impressions || 0);
            maxImprEl.innerText = impressions.length ? Math.max(...impressions).toLocaleString() : '0';
            const dates = adsData.map(a => a.date).filter(Boolean);
            lastUpdatedEl.innerText = dates.length ? [...dates].sort().pop() : '-';
        }

        function renderAds(data) {
            adGrid.innerHTML = '';
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            data.forEach((ad, index) => {
                const card = document.createElement('div');
                card.className = 'ad-card glass rounded-2xl overflow-hidden cursor-pointer group';
                card.onclick = () => openModal(ad);
                
                card.innerHTML = `
                    <div class="relative aspect-[3/4] bg-slate-900 overflow-hidden">
                        <video class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-500" 
                               loop muted onmouseover="this.play()" onmouseout="this.pause()">
                            <source src="public/videos/${ad.videoName}" type="video/mp4">
                        </video>
                        <div class="video-overlay absolute inset-0 flex flex-col justify-end p-4">
                            <span class="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-[10px] font-mono border border-white/10 uppercase">
                                Rank #${index + 1}
                            </span>
                            <div class="flex items-center gap-1.5 text-blue-400 mb-1">
                                <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                                <span class="text-sm font-bold tracking-tight">${(ad.impressions || 0).toLocaleString()}</span>
                            </div>
                            <p class="text-xs text-slate-200 font-medium line-clamp-2 leading-relaxed">${ad.title}</p>
                        </div>
                    </div>
                    <div class="p-3 flex items-center justify-between text-[10px] text-slate-500 font-mono">
                        <span>ID: ${ad.id.slice(0, 8)}</span>
                        <span>${ad.date || '-'}</span>
                    </div>
                `;
                adGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        function handleFilter() {
            const query = searchInput.value.toLowerCase();
            const sort = sortSelect.value;
            
            let filtered = adsData.filter(ad => 
                ad.title.toLowerCase().includes(query)
            );

            if (sort === 'impressions') {
                filtered.sort((a, b) => (b.impressions || 0) - (a.impressions || 0));
            } else {
                filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            }

            renderAds(filtered);
        }

        function openModal(ad) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            document.getElementById('modalTitle').innerText = ad.title;
            document.getElementById('modalDate').innerText = ad.date || 'Unknown Date';
            document.getElementById('modalImpressions').innerText = (ad.impressions || 0).toLocaleString();
            
            video.src = `public/videos/${ad.videoName}`;
            modal.classList.remove('hidden');
            video.play();
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            modal.classList.add('hidden');
            video.pause();
        }

        searchInput.addEventListener('input', handleFilter);
        sortSelect.addEventListener('change', handleFilter);

        init();
