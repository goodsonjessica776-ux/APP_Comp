name: Daily Ad Crawl
on:
  schedule:
    - cron: '0 1 * * *' # 每天凌晨1点执行 (UTC)
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run Crawler
        env:
          APPGROWING_COOKIE: ${{ secrets.APPGROWING_COOKIE }}
        run: python crawler/fetch_ads.py
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/ads.json public/videos/*.mp4
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Daily crawl update" && git push)
