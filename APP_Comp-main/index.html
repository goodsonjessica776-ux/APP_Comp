<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发现 | TOP 50 爆款广告图鉴</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">✨</span>
                    <h1 class="logo-text">AdVision <span>Library</span></h1>
                </div>
                <div class="filter-controls">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索素材标题...">
                    </div>
                    <div class="sort-box">
                        <select id="sortSelect">
                            <option value="impression_desc">曝光量由高到低</option>
                            <option value="impression_asc">曝光量由低到高</option>
                            <option value="date_desc">最新发布</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Gallery -->
        <main class="gallery-main">
            <div class="stats-bar">
                <p>共收录 <span id="totalCount" class="highlight">0</span> 个当期最高曝光视频素材</p>
            </div>
            
            <div class="masonry-grid" id="galleryGrid">
                <!-- Cards injected by JS -->
            </div>
        </main>
    </div>

    <!-- Data script generated by Python -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
